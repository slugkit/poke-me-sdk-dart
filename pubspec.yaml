name: pokeme
description: "PokeMe push notification SDK — platform token retrieval for the poke-me service"
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.pokeme.pokeme
        pluginClass: PokemePlugin
      ios:
        pluginClass: PokemePlugin
      macos:
        pluginClass: PokemePlugin
